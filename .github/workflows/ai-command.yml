name: AI Command

# Reusable workflow — call this when a user mentions @ai-cli in a comment.
#
# The user's free-form text (everything after @ai-cli) is sent directly to the
# AI as a prompt. An optional skill and rules can be provided to give the AI
# a consistent persona and constraints.

on:
  workflow_call:
    inputs:
      command:
        description: >
          Free-form instruction text extracted from the @ai-cli mention.
          This becomes the primary prompt sent to the AI.
        type: string
        required: true
      skill_name:
        description: >
          Optional predefined skill to apply for this command.
          When set, the skill's persona and instructions frame the response.
        type: string
        required: false
        default: ''
      skill_file_content:
        description: >
          Optional inline skill content. Takes precedence over skill_name.
        type: string
        required: false
        default: ''
      rules:
        description: >
          Comma-separated rule names from .rules/ to apply alongside the command.
        type: string
        required: false
        default: ''
      pr_number:
        description: PR number to reply to (provide pr_number or issue_number)
        type: number
        required: false
        default: 0
      issue_number:
        description: Issue number to reply to (provide pr_number or issue_number)
        type: number
        required: false
        default: 0
      app_name:
        description: Display name shown in the reply comment header
        type: string
        required: false
        default: AI Review Bot
      runner:
        description: GitHub Actions runner label
        type: string
        required: false
        default: ubuntu-latest
      aicli_repo:
        description: Source repository containing this reusable workflow's skills, rules, and composite actions.
        type: string
        required: false
        default: ikaruce/ai-cli-workflow
      aicli_ref:
        description: Git ref (branch/tag/SHA) to check out from aicli_repo.
        type: string
        required: false
        default: main
      aibot_url:
        description: "URL of the aibot backend (used to fetch a fresh GitHub App installation token)"
        type: string
        required: true
      allow_github_token_fallback:
        description: >
          When true, fall back to the workflow's built-in GITHUB_TOKEN if the
          aibot backend can't issue an installation token. Off by default
          because the fallback token has narrower permissions and may produce
          downstream 401/403 errors that hide the real backend failure.
        type: boolean
        required: false
        default: false
    secrets:
      AI_CLI_API_KEY:
        description: API key for the AI tool (Gemini, etc.)
        required: true
      AI_CLI_APP_TOKEN:
        description: "Static API key for the aibot backend, used to authorize POST /api/v1/token"
        required: true

jobs:
  run-command:
    runs-on: ${{ inputs.runner }}
    steps:
      # ── 1. Fetch a fresh GitHub App installation token from the aibot backend.
      #    Falls back to the workflow's GITHUB_TOKEN if the backend call fails.
      - name: Fetch installation token
        id: token
        env:
          AIBOT_URL:      ${{ inputs.aibot_url }}
          API_KEY:        ${{ secrets.AI_CLI_APP_TOKEN }}
          ALLOW_FALLBACK: ${{ inputs.allow_github_token_fallback }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          set +e
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$AIBOT_URL/api/v1/token" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"repo\": \"$GITHUB_REPOSITORY\"}")
          CURL_EXIT=$?
          set -e

          HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s' "$RESPONSE" | sed '$d')

          TOKEN=""
          if [[ $CURL_EXIT -eq 0 && "$HTTP_CODE" == "200" ]]; then
            TOKEN=$(printf '%s' "$BODY" | jq -r .token)
          fi

          SOURCE="aibot"
          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            if [[ "$ALLOW_FALLBACK" == "true" ]]; then
              echo "::warning::aibot token fetch failed (curl=$CURL_EXIT, http=$HTTP_CODE). Falling back to workflow GITHUB_TOKEN — the fallback token has narrower permissions and may produce 401/403 downstream."
              TOKEN="$FALLBACK_TOKEN"
              SOURCE="github.token (fallback, opt-in)"
            else
              echo "::error::aibot token fetch failed (curl=$CURL_EXIT, http=$HTTP_CODE). Set inputs.allow_github_token_fallback=true to permit the GITHUB_TOKEN fallback, or fix the backend / AI_CLI_APP_TOKEN."
              echo "Backend response body (first 500 chars): ${BODY:0:500}"
              exit 1
            fi
          fi

          if [[ -z "$TOKEN" ]]; then
            echo "::error::Token resolved to empty value."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "Token source: $SOURCE  |  length: ${#TOKEN}"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # ── 2. Check out this workflow's own source (skills, rules, actions) ──
      - name: Checkout aicli-workflow repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.aicli_repo }}
          ref: ${{ inputs.aicli_ref }}
          path: .aicli
          persist-credentials: false

      - name: Export aicli repo path for composite actions
        run: echo "AICLI_REPO_PATH=$GITHUB_WORKSPACE/.aicli" >> "$GITHUB_ENV"

      # ── 3. Install AI CLI ─────────────────────────────────────────────────
      - name: Setup AI CLI
        uses: ./.aicli/.github/actions/setup-ai-cli
        with:
          api_key: ${{ secrets.AI_CLI_API_KEY }}

      # ── 4. Execute the user's command ─────────────────────────────────────
      - name: Run AI command
        id: ai
        uses: ./.aicli/.github/actions/run-ai-task
        with:
          skill_name: ${{ inputs.skill_name }}
          skill_file_content: ${{ inputs.skill_file_content }}
          rules: ${{ inputs.rules }}
          prompt: ${{ inputs.command }}
          output_format: markdown

      # ── 5. Reply as a comment ─────────────────────────────────────────────
      - name: Post reply comment
        uses: ./.aicli/.github/actions/post-comment
        with:
          github_token: ${{ steps.token.outputs.token }}
          body: ${{ steps.ai.outputs.result }}
          app_name: ${{ inputs.app_name }}
          pr_number: ${{ inputs.pr_number != 0 && inputs.pr_number || '' }}
          issue_number: ${{ inputs.issue_number != 0 && inputs.issue_number || '' }}
          repo: ${{ github.repository }}
